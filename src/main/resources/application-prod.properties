# Production configuration
spring.application.name=in

# Database connection - will be overridden by environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/eazy_school}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true

# Server configuration
server.port=${PORT:8080}

# Security
JWT_SECRET_KEY=${JWT_SECRET:jjshjhuwiuhkdhkjh4uit4kkszjgh49098sh}
DEFAULT_SECRET_VALUE=${DEFAULT_SECRET:hmhhcttkutuycyjjytcsdzqwqulilouvhttch54hx5ehxeagcdhtc}

# Custom properties
in.pageSize=10
in.contact.successMessage=your request has been processed successfully
in.contactPageSize=6

in.branches[0]=tokyo
in.branches[1]=newYork
in.branches[2]=delhi
in.branches[3]=mumbai
in.branches[4]=frace
in.branches[5]=USA
in.branches[6]=moda
in.branches[7]=hiddenLeafVillage

# Actuator
management.endpoints.web.exposure.include=health,info

# Thymeleaf
spring.thymeleaf.cache=true

# Data REST
spring.data.rest.base-path=/data-api